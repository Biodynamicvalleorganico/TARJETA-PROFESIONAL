<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop Salsa Biomecánica | THE MORENO METHOD</title>
  <meta name="description" content="Mini landing page premium con QR Nequi y WhatsApp para el Workshop Salsa Biomecánica de THE MORENO METHOD en Cali, 6 de mayo de 2026." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#07111b; --text:#f7fbff; --muted:#d9e7ef; --faint:#95aebd; --line:rgba(255,255,255,.12);
      --cyan:#7be7f5; --cyan2:#2abbd2; --gold:#d7b267; --gold2:#f2dfaf;
      --surface:rgba(8,19,32,.82); --surface2:rgba(10,28,45,.92);
      --shadow:0 24px 70px rgba(0,0,0,.40); --radius:30px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;
      background:linear-gradient(180deg,rgba(3,8,14,.16),rgba(3,8,14,.93));
    }
    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%;height:auto}
    .page{width:min(100%,540px);margin:0 auto;padding:14px 12px 34px}
    .hero{
      position:relative;overflow:hidden;border-radius:34px;border:1px solid var(--line);box-shadow:var(--shadow);
      background:linear-gradient(180deg,rgba(7,18,30,.76),rgba(4,11,20,.97));backdrop-filter:blur(14px);
      animation:floatIn .9s cubic-bezier(.16,1,.3,1);
    }
    .hero::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(circle at top center,rgba(123,231,245,.16),transparent 36%),
                 radial-gradient(circle at bottom right,rgba(215,178,103,.11),transparent 28%);
      pointer-events:none;
    }
    .inner{position:relative;z-index:1;padding:22px 16px 18px}
    .topbar{display:flex;justify-content:center;margin-bottom:14px}
    .logo-card{
      width:112px;height:112px;border-radius:26px;padding:10px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);
      animation:fadeUp 1s .12s both;
    }
    .logo-card img{width:100%;height:100%;object-fit:contain;border-radius:16px}
    .eyebrow{
      text-align:center;color:var(--cyan);font-size:.77rem;letter-spacing:.2em;
      text-transform:uppercase;font-weight:800;animation:fadeUp 1s .18s both;
    }
    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.55rem,10.5vw,4.45rem);
      line-height:.9;text-align:center;margin:12px 0 10px;
      animation:fadeUp 1s .24s both;
    }
    .lead{
      text-align:center;color:var(--muted);line-height:1.65;font-size:1rem;
      max-width:34ch;margin:0 auto 16px;animation:fadeUp 1s .32s both;
    }
    .quick{display:grid;gap:10px;margin-bottom:16px;animation:fadeUp 1s .38s both}
    .quick div{
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
      border-radius:18px;padding:13px 14px;
    }
    .quick strong{
      display:block;color:var(--gold2);font-size:.78rem;text-transform:uppercase;
      letter-spacing:.14em;margin-bottom:6px;
    }
    .benefits{display:grid;gap:10px;margin-bottom:16px}
    .benefit{
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:15px;
      transform:translateY(12px);opacity:0;
      animation:fadeUp .9s cubic-bezier(.16,1,.3,1) forwards;
    }
    .benefit:nth-child(1){animation-delay:.44s}
    .benefit:nth-child(2){animation-delay:.52s}
    .benefit:nth-child(3){animation-delay:.60s}
    .benefit h2{
      color:var(--cyan);font-size:.95rem;text-transform:uppercase;
      letter-spacing:.12em;margin-bottom:8px;
    }
    .benefit p{color:var(--muted);line-height:1.62;font-size:.96rem}
    .payment{
      margin-top:8px;background:linear-gradient(180deg,rgba(11,30,47,.92),rgba(6,16,28,.98));
      border:1px solid rgba(255,255,255,.10);border-radius:26px;padding:16px;
      animation:fadeUp 1s .66s both;
    }
    .payment small{
      color:var(--faint);text-transform:uppercase;letter-spacing:.16em;font-weight:800;
    }
    .price{color:var(--gold);font-size:2.5rem;font-weight:800;line-height:1;margin:6px 0 10px}
    .payment p{color:var(--muted);line-height:1.62;margin-bottom:12px}
    .qr{
      background:#fff;border-radius:24px;padding:12px;
      box-shadow:0 16px 28px rgba(0,0,0,.18);
    }
    .qr img{width:100%;border-radius:16px}
    .qr span{
      display:block;text-align:center;color:#0e1821;font-weight:800;font-size:.9rem;margin-top:10px;
    }
    .cta{display:grid;gap:10px;margin-top:14px}
    .btn{
      min-height:54px;border-radius:999px;display:flex;align-items:center;justify-content:center;
      font-weight:800;padding:14px 16px;text-align:center;
    }
    .btn-main{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#06111b;box-shadow:0 14px 28px rgba(215,178,103,.22);
    }
    .btn-main:hover{transform:translateY(-1px)}
    .btn-alt{
      background:rgba(123,231,245,.10);border:1px solid rgba(123,231,245,.28);
    }
    .btn-wa{
      background:linear-gradient(135deg,#1fa95f,#32d074);color:#04140c;
    }
    .sticky-bar{
      position:sticky;bottom:10px;z-index:10;margin-top:14px;
      animation:fadeUp 1s .84s both;
    }
    .sticky-inner{
      display:grid;grid-template-columns:1fr;gap:10px;
      background:rgba(6,15,25,.88);border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(12px);border-radius:24px;padding:12px;box-shadow:var(--shadow);
    }
    .mini{
      text-align:center;color:var(--faint);font-size:.84rem;line-height:1.5;margin-top:6px;
    }

      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
